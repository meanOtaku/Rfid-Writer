<!DOCTYPE html>
<html>

<head>
    <title>NDEF Tools</title>
    <link rel="stylesheet" href="../../style.css">
</head>

<body>

    <div class="container">

        <h1>NDEF Tools</h1>

        <a class="navButton" href="../../index.html">
            Home
        </a>

        <div class="card">

            <h2>RFID Status</h2>

            <p>
                UID:
                <span id="rfidUid">
                    No Card
                </span>
            </p>

            <p>
                Status:
                <span id="rfidStatus">
                    Waiting for card...
                </span>
            </p>

        </div>

        <div class="card">

            <h2>Mode</h2>

            <label>
                <input type="radio" name="rfidMode" value="read" checked>

                Read NDEF
            </label>

            <br><br>

            <label>
                <input type="radio" name="rfidMode" value="write">

                Write NDEF
            </label>

        </div>

        <div class="card">

            <h2>NDEF Message Editor</h2>

            <textarea id="blockData" rows="8" placeholder="Enter NDEF text message to write">
        </textarea>

        </div>

        <div class="card">

            <h2>Read Result</h2>

            <pre id="readResult">
No data read yet
        </pre>

        </div>

        <div class="card">

            <h2>Tag Management</h2>

            <p>Format Mifare Classic sectors to make them compatible with NDEF containers.</p>

            <button id="formatButton" class="navButton" style="background-color: #d9534f; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px;">
                Format Tag as NDEF
            </button>

        </div>

    </div>

    <script src="ndef.js"></script>

</body>

</html>
