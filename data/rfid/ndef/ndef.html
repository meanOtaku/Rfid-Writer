<!DOCTYPE html>
<html>

<head>
    <title>NDEF Tools</title>
    <link rel="stylesheet" href="../../style.css">
</head>

<body>

    <div class="container">

        <h1>NDEF Tools</h1>

        <a class="navButton" href="../../index.html">
            Home
        </a>

        <div class="toolGrid">

            <div>

                <div class="card">

                    <h2>RFID Status</h2>

                    <p>
                        UID:
                        <span id="rfidUid">
                            No Card
                        </span>
                    </p>

                    <p>
                        Status:
                        <span id="rfidStatus">
                            Waiting for card...
                        </span>
                    </p>

                </div>

                <div class="card">

                    <h2>Mode</h2>

                    <label>
                        <input type="radio" name="rfidMode" value="read" checked>

                        Read NDEF
                    </label>

                    <br>

                    <label>
                        <input type="radio" name="rfidMode" value="write">

                        Write NDEF
                    </label>

                </div>

                <div class="card">

                    <h2>NDEF Message Editor</h2>

                    <textarea id="blockData" rows="6" placeholder="Enter NDEF text message to write"></textarea>

                </div>

            </div>

            <div class="card resultCard">

                <h2>Read Result</h2>

                <pre id="readResult">No data read yet</pre>

            </div>

        </div>

    </div>

    <script src="ndef.js"></script>

</body>

</html>
