<!DOCTYPE html>
<html>

<head>
    <title>Form Upload</title>
    <link rel="stylesheet" href="../../style.css">
</head>

<body>

    <div class="container">

        <h1>Form Upload</h1>

        <div class="networkBar">
            <span>
                AP:
                <strong id="networkApIp">Loading...</strong>
            </span>
            <span>
                WiFi:
                <strong id="networkStaIp">Loading...</strong>
            </span>
            <span>
                Network:
                <strong id="networkStaName">Loading...</strong>
            </span>
            <span>
                Connect:
                <strong id="networkRetryStatus">Loading...</strong>
            </span>
        </div>

        <a class="navButton" href="../../index.html">
            Home
        </a>

        <div class="toolGrid">

            <div>

                <div class="card">

                    <h2>RFID Status</h2>

                    <p>
                        UID:
                        <span id="rfidUid">
                            No Card
                        </span>
                    </p>

                    <p>
                        Status:
                        <span id="rfidStatus">
                            Waiting for card...
                        </span>
                    </p>

                </div>

                <div class="card">

                    <h2>Upload Status</h2>

                    <p id="uploadStatus">
                        Tap an NDEF card with form data
                    </p>

                </div>

            </div>

            <div class="card resultCard">

                <h2>Card Data</h2>

                <pre id="readResult">No data read yet</pre>

            </div>

        </div>

    </div>

    <script src="../../network_status.js"></script>
    <script src="../../rfid_display.js"></script>
    <script src="form_submit.js"></script>

</body>

</html>
