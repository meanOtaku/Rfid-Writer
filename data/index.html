<!DOCTYPE html>
<html>

<head>
    <title>RFID Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>RFID Manager</h1>

        <div class="networkBar">
            <span>
                AP:
                <strong id="networkApIp">Loading...</strong>
            </span>
            <span>
                WiFi:
                <strong id="networkStaIp">Loading...</strong>
            </span>
            <span>
                Network:
                <strong id="networkStaName">Loading...</strong>
            </span>
            <span>
                Connect:
                <strong id="networkRetryStatus">Loading...</strong>
            </span>
        </div>

        <div class="toolGrid">

            <div>

                <div class="card">

                    <h2>Auto Reader</h2>

                    <p>
                        UID:
                        <span id="rfidUid">
                            No Card
                        </span>
                    </p>

                    <p>
                        Card:
                        <span id="cardType">
                            Unknown
                        </span>
                    </p>

                    <p>
                        Data:
                        <span id="dataType">
                            Auto
                        </span>
                    </p>

                    <p>
                        Status:
                        <span id="rfidStatus">
                            Waiting for card...
                        </span>
                    </p>

                </div>

                <div class="card">

                    <h2>Navigation</h2>

                    <a class="navButton" href="wifi/wifi.html">
                        WiFi Configuration
                    </a>
                    <br><br>
                    <a class="navButton" href="rfid/mifare/mifare.html">
                        Mifare Classic Tools
                    </a>
                    <br><br>
                    <a class="navButton" href="rfid/ndef/ndef.html">
                        NDEF Tools
                    </a>
                    <br><br>
                    <a class="navButton" href="rfid/form_submit/form_submit.html">
                        Form Upload
                    </a>

                </div>

            </div>

            <div class="card resultCard">

                <h2>Read Result</h2>

                <pre id="readResult">No data read yet</pre>

            </div>

        </div>

    </div>

    <script src="network_status.js"></script>
    <script src="rfid_display.js"></script>
    <script src="home.js"></script>

</body>

</html>
