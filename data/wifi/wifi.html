<!DOCTYPE html>
<html>

<head>
    <title>WiFi Configuration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>WiFi Configuration</h1>

        <div class="networkBar">
            <span>
                AP:
                <strong id="networkApIp">Loading...</strong>
            </span>
            <span>
                WiFi:
                <strong id="networkStaIp">Loading...</strong>
            </span>
            <span>
                Network:
                <strong id="networkStaName">Loading...</strong>
            </span>
            <span>
                Connect:
                <strong id="networkRetryStatus">Loading...</strong>
            </span>
        </div>

        <a class="navButton" href="../index.html">
            Home
        </a>

        <div class="card">

            <h2>Status</h2>

            <p id="status">
                Not Connected
            </p>

        </div>

        <div class="card">

            <h2>Connect WiFi</h2>

            <label class="choice">
                <input type="radio" name="wifiMode" value="saved" checked>
                Saved WiFi
            </label>

            <label class="choice">
                <input type="radio" name="wifiMode" value="new">
                New WiFi
            </label>

            <div id="savedWifiSection">
                <div id="savedNetworks" class="savedNetworks">
                    Loading saved networks...
                </div>

                <div class="buttonRow">
                    <button id="connectSaved">
                        Connect Saved
                    </button>

                    <button id="deleteSaved">
                        Delete Selected
                    </button>
                </div>
            </div>

            <div id="newWifiSection" class="hidden">
                <button id="scan">
                    Scan Networks
                </button>

                <select id="networks">
                    <option>
                        Select Network
                    </option>
                </select>

                <input type="password" id="password" placeholder="WiFi Password">

                <button id="connect">
                    Connect New WiFi
                </button>
            </div>

        </div>

    </div>

    <script src="../network_status.js"></script>
    <script src="wifi.js"></script>

</body>

</html>
